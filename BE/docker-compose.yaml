version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barber-backend
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - barber

  nginx:
    image: nginx:alpine
    container_name: barber-backend-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - barber

  mysql:
    image: mysql:8.0
    container_name: barber-backend-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - barber

  redis:
    image: redis:alpine
    container_name: barber-backend-redis
    ports:
      - "6379:6379"
    networks:
      - barber

networks:
  barber:

volumes:
  mysql_data:
